<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>第二部分問卷</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; margin: 0; padding: 24px; line-height: 1.6; }
    .card { max-width: 720px; margin: 10vh auto 0; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; }
    .title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    .muted { color: #666; margin: 0; }
    .warn { color: #b00020; font-weight: 700; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <p class="title" id="title">正在前往第二部分問卷…</p>
    <p class="muted" id="desc">請稍候，系統將自動導向。</p>

    <p class="warn hidden" id="warn">請先完成第一部分問卷</p>
    <p class="muted hidden" id="help">
      若你已完成第一部分但仍看到此訊息，請確認使用同一台裝置與同一個瀏覽器開啟此頁面，並允許網站儲存資料（localStorage）。
    </p>

    <noscript>
      <p class="warn">此頁面需要啟用 JavaScript 才能自動配對並導向問卷。</p>
    </noscript>
  </div>

  <script>
    (function () {
      // ✅ 固定問卷2連結（不要改架構）
      const SURVEY2_BASE = "https://www.surveycake.com/s/RbZ8y";

      const els = {
        title: document.getElementById("title"),
        desc: document.getElementById("desc"),
        warn: document.getElementById("warn"),
        help: document.getElementById("help"),
      };

      function showMissing() {
        els.title.textContent = "無法進入第二部分";
        els.desc.classList.add("hidden");
        els.warn.classList.remove("hidden");
        els.help.classList.remove("hidden");
      }

      function safeGetAkaPid() {
        try {
          const v = localStorage.getItem("aka_pid");
          if (!v) return null;
          const trimmed = String(v).trim();
          return trimmed ? trimmed : null;
        } catch (e) {
          // localStorage 被禁用/無痕/權限限制等
          return null;
        }
      }

      const akaPid = safeGetAkaPid();
      if (!akaPid) {
        showMissing();
        return;
      }

      // ✅ 找到 aka_pid：無感導向（自動帶入參數）
      try {
        const url = new URL(SURVEY2_BASE);
        // 若 SurveyCake 需要不同參數名，這裡只改 key，不動其他邏輯
        url.searchParams.set("aka_pid", akaPid);

        // 立即轉跳；replace 不留返回紀錄（更「無感」）
        window.location.replace(url.toString());
      } catch (e) {
        // 理論上不會發生；發生就當作找不到處理，避免誤進問卷
        showMissing();
      }
    })();
  </script>
</body>
</html>
