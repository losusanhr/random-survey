<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>問卷分派中...</title>
</head>
<body>
  <p id="msg">系統分派問卷中，請稍候...</p>

  <script>
    const surveys = [
      { ver: "O2", url: "https://www.surveycake.com/s/XmzDP" },
      { ver: "O3", url: "https://www.surveycake.com/s/Qy96v" },
      { ver: "O4", url: "https://www.surveycake.com/s/xkLb8" },
      { ver: "O5", url: "https://www.surveycake.com/s/8ZKBP" },
      { ver: "O8", url: "https://www.surveycake.com/s/AvKZD" },
      { ver: "O9", url: "https://www.surveycake.com/s/ZzBYm" },
      { ver: "O11", url: "https://www.surveycake.com/s/3XNzM" }
    ];

    const params = new URLSearchParams(window.location.search);
    const pid = params.get("pid") || "";

    const storageKey = "random_survey_assignment";

    function buildUrl(url, ver, pidValue) {
      const targetUrl = new URL(url);
      targetUrl.searchParams.set("aka_ver", ver);
      targetUrl.searchParams.set("aka_pid", pidValue);
      return targetUrl.toString();
    }

    let saved = null;
    try {
      saved = JSON.parse(localStorage.getItem(storageKey));
    } catch (e) {
      saved = null;
    }

    if (saved && saved.url && saved.ver) {
      const finalUrl = buildUrl(saved.url, saved.ver, saved.pid || pid);
      window.location.replace(finalUrl);
    } else {
      const selected = surveys[Math.floor(Math.random() * surveys.length)];

      const assignment = {
        ver: selected.ver,
        url: selected.url,
        pid: pid
      };

      localStorage.setItem(storageKey, JSON.stringify(assignment));

      const finalUrl = buildUrl(selected.url, selected.ver, pid);
      window.location.replace(finalUrl);
    }
  </script>
</body>
</html>
