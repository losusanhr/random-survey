<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Survey Redirect</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; margin: 0; padding: 24px; }
    .card { max-width: 720px; margin: 12vh auto; border: 1px solid #e5e5e5; border-radius: 12px; padding: 18px 18px; }
    .title { font-weight: 700; margin: 0 0 8px; }
    .muted { color: #666; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">正在進入問卷…</p>
    <p class="muted">若未自動跳轉，請重新整理一次。</p>
  </div>

  <script>
    (function () {
      // 兩個版本（你指定的 SurveyCake 問卷網址）
      var SURVEYS = [
        "https://www.surveycake.com/s/QOONA", // P1 不信任
        "https://www.surveycake.com/s/AdBOR"  // P2 沒有不信任
      ];

      // 入口網址若帶 aka_pid，就傳給 SurveyCake
      var params = new URLSearchParams(window.location.search);
      var akaPid = params.get("aka_pid"); // 只處理這個參數（你要的）

      // 隨機抽一個
      var chosen = SURVEYS[Math.floor(Math.random() * SURVEYS.length)];

      // 組合目的地 URL（把 aka_pid 帶過去）
      var dest = new URL(chosen);
      if (akaPid) dest.searchParams.set("aka_pid", akaPid);

      // 直接跳轉（replace 不會把入口留在返回歷史裡）
      window.location.replace(dest.toString());
    })();
  </script>
</body>
</html>
