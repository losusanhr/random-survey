<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>問卷分派中...</title>
</head>
<body>
  <p>系統分派問卷中，請稍候...</p>

  <script>
    const surveys = [
      { ver: "O1", url: "https://www.surveycake.com/s/N76ro" },
      { ver: "O2", url: "https://www.surveycake.com/s/XmzDP" },
      { ver: "O3", url: "https://www.surveycake.com/s/Qy96v" },
      { ver: "O4", url: "https://www.surveycake.com/s/xkLb8" },
      { ver: "O5", url: "https://www.surveycake.com/s/8ZKBP" },
      { ver: "O6", url: "https://www.surveycake.com/s/LOMgK" },
      { ver: "O7", url: "https://www.surveycake.com/s/3XNVN" },
      { ver: "O8", url: "https://www.surveycake.com/s/AvKZD" },
      { ver: "O9", url: "https://www.surveycake.com/s/ZzBYm" },
      { ver: "O10", url: "https://www.surveycake.com/s/N4Mdx" },
      { ver: "O11", url: "https://www.surveycake.com/s/3XNzM" },
      { ver: "O12", url: "https://www.surveycake.com/s/k8dz3" }
    ];

    const params = new URLSearchParams(window.location.search);
    const pid = params.get("pid") || "";

    const selected = surveys[Math.floor(Math.random() * surveys.length)];

    const targetUrl = new URL(selected.url);
    targetUrl.searchParams.set("aka_ver", selected.ver);
    targetUrl.searchParams.set("aka_pid", pid);

    window.location.replace(targetUrl.toString());
  </script>
</body>
</html>
